<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABUY — Loja</title>

<link rel="icon" type="image/svg+xml" href="../assets/icon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="512x512" href="../assets/favicon-512.png">

<meta property="og:title" content="ABUY — Loja">
<meta property="og:description" content="Atrai. Filtra. Converte.">
<meta property="og:image" content="https://abuystore.netlify.app/assets/og-loja.png">
<meta property="og:url" content="https://abuystore.netlify.app/loja/">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-void:#0a0e16;
    --bg-panel:#10172a;
    --bg-panel-2:#0d1320;
    --accent-cyan:#2de2e6;
    --accent-magenta:#ff2469;
    --accent-amber:#ffcb47;
    --text-primary:#e7eef5;
    --text-dim:#7c8aa0;
    --line:rgba(45,226,230,0.18);
    --font-display:'Chakra Petch', sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg-void);color:var(--text-primary);font-family:var(--font-mono);line-height:1.6;}
  a{color:inherit;text-decoration:none;}
  ::selection{background:var(--accent-magenta);color:var(--bg-void);}
  :focus-visible{outline:2px solid var(--accent-cyan);outline-offset:3px;}
  .wrap{max-width:1080px;margin:0 auto;padding:0 24px;}
  h1,h2,h3{font-family:var(--font-display);text-transform:uppercase;}

  nav{display:flex;align-items:center;justify-content:space-between;padding:22px 24px;max-width:1080px;margin:0 auto;}
  .logo{font-family:var(--font-display);font-weight:700;font-size:15px;letter-spacing:0.05em;}
  .logo span{color:var(--accent-cyan);}
  .status-pill{
    font-size:11px;letter-spacing:0.1em;color:var(--accent-amber);
    border:1px solid rgba(255,203,71,0.4);padding:6px 12px;border-radius:2px;
    display:flex;align-items:center;gap:8px;
  }
  .status-pill::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--accent-amber);animation:pulse 1.6s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.25;}}

  header.hero{
    padding:50px 0 60px;
    border-bottom:1px solid var(--line);
    background-image:
      linear-gradient(rgba(10,14,22,0.94), rgba(10,14,22,0.98)),
      repeating-linear-gradient(0deg, transparent 0 38px, var(--line) 38px 39px),
      repeating-linear-gradient(90deg, transparent 0 38px, var(--line) 38px 39px);
  }
  .eyebrow{
    font-size:12px;letter-spacing:0.25em;text-transform:uppercase;color:var(--accent-cyan);
    display:flex;align-items:center;gap:10px;margin-bottom:16px;
  }
  .eyebrow::before{content:"";width:8px;height:8px;background:var(--accent-cyan);box-shadow:0 0 8px var(--accent-cyan);flex-shrink:0;}
  header.hero h1{font-size:clamp(30px,4.4vw,46px);line-height:1.1;margin-bottom:14px;}
  header.hero p{color:var(--text-dim);max-width:520px;font-size:15px;}

  section.catalog{padding:60px 0 100px;}

  .filters{display:flex;gap:10px;margin-bottom:28px;flex-wrap:wrap;}
  .filter-btn{
    font-family:var(--font-mono);
    font-size:12px;letter-spacing:0.08em;text-transform:uppercase;
    color:var(--text-dim);
    background:var(--bg-panel);
    border:1px solid var(--line);
    padding:10px 16px;
    cursor:pointer;
    transition:color 0.15s ease, border-color 0.15s ease;
  }
  .filter-btn:hover{color:var(--text-primary);}
  .filter-btn.is-active{
    color:var(--bg-void);
    background:var(--accent-cyan);
    border-color:var(--accent-cyan);
  }

  .grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));gap:1px;background:var(--line);border:1px solid var(--line);}

  .card{
    background:var(--bg-panel);
    display:flex;flex-direction:column;
    text-decoration:none;
    transition:background 0.15s ease;
  }
  .card:hover{background:var(--bg-panel-2);}
  .card__media{
    aspect-ratio:4/3;
    background:var(--bg-panel-2);
    display:flex;align-items:center;justify-content:center;
    border-bottom:1px solid var(--line);
    overflow:hidden;
    position:relative;
  }
  .card__media img{width:100%;height:100%;object-fit:cover;}
  .card__media svg{width:48px;height:48px;color:var(--text-dim);}
  .card__tag{
    position:absolute;top:10px;left:10px;
    font-size:10px;letter-spacing:0.1em;text-transform:uppercase;
    padding:4px 8px;border:1px solid var(--line);background:rgba(10,14,22,0.85);
    color:var(--accent-cyan);
  }
  .card__body{padding:18px 20px;display:flex;flex-direction:column;gap:8px;flex:1;}
  .card__name{font-family:var(--font-display);font-size:16px;letter-spacing:0.02em;}
  .card__desc{font-size:13px;color:var(--text-dim);flex:1;}
  .card__footer{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
  .card__price{font-family:var(--font-display);color:var(--accent-cyan);font-size:18px;}
  .card__cta{font-size:12px;letter-spacing:0.05em;color:var(--text-primary);display:flex;align-items:center;gap:4px;}
  .card__cta::after{content:"›";font-size:14px;color:var(--accent-cyan);}

  .state-msg{
    padding:60px 24px;text-align:center;color:var(--text-dim);font-size:14px;
    border:1px solid var(--line);background:var(--bg-panel);grid-column:1 / -1;
  }
  .state-msg.is-error{color:var(--accent-magenta);}

  footer{border-top:1px solid var(--line);padding:30px 0;color:var(--text-dim);font-size:12px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;max-width:1080px;margin:0 auto;padding-left:24px;padding-right:24px;}
</style>
</head>
<body>

  <nav>
    <a href="/" style="display:flex;align-items:center;gap:10px;">
      <span style="font-size:12px;color:var(--text-dim);">←</span>
      <div class="logo">ABU<span>Y</span></div>
    </a>
    <div class="status-pill">LOJA ONLINE</div>
  </nav>

  <header class="hero">
    <div class="wrap">
      <h1 style="display:flex;align-items:center;gap:16px;">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width:48px;height:48px;flex-shrink:0;">
          <g stroke="#2de2e6" stroke-width="4" fill="none">
            <line x1="50" y1="50" x2="50" y2="16"/>
            <line x1="50" y1="50" x2="80" y2="67"/>
            <line x1="50" y1="50" x2="20" y2="67"/>
          </g>
          <circle cx="50" cy="50" r="11" fill="#2de2e6"/>
          <circle cx="50" cy="16" r="6.5" fill="#e7eef5"/>
          <circle cx="80" cy="67" r="6.5" fill="#e7eef5"/>
          <circle cx="20" cy="67" r="6.5" fill="#ff2469"/>
        </svg>
        ABU<span style="color:var(--accent-cyan)">Y</span>
      </h1>
      <p>Todos os produtos disponíveis agora. Clique em qualquer um pra ver os detalhes e finalizar a compra.</p>
    </div>
  </header>

  <section class="catalog">
    <div class="wrap">
      <div class="filters" id="filters">
        <button class="filter-btn is-active" data-filter="all">Todos</button>
        <button class="filter-btn" data-filter="digital">Digital</button>
        <button class="filter-btn" data-filter="physical">Físico</button>
      </div>
      <div class="grid" id="productGrid">
        <div class="state-msg" id="stateMsg">Carregando catálogo...</div>
      </div>
    </div>
  </section>

  <footer>
    <span>ABUY © 2026</span>
    <span>contato@seudominio.com</span>
  </footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ──────────────────────────────────────────────────────────
  // CONFIGURAÇÃO — Project URL e a chave PÚBLICA (anon) do Supabase.
  // Diferente da service_role key: esta aqui é segura pra ficar
  // visível no código, desde que o RLS (regras de segurança) esteja
  // configurado certo no banco — é exatamente isso que o arquivo
  // update_catalogo.sql configura.
  // ──────────────────────────────────────────────────────────
  const SUPABASE_URL = 'https://cmkeabkmaivfrgyfisxx.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_fk41n_QrtzHJ_RoJss_Dww_N6IU-0LP';

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const grid = document.getElementById('productGrid');
  const stateMsg = document.getElementById('stateMsg');
  const filtersEl = document.getElementById('filters');

  let allProducts = [];
  let currentFilter = 'all';

  function priceLabel(cents){
    return 'R$ ' + (cents / 100).toFixed(2).replace('.', ',');
  }

  function placeholderIcon(){
    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <rect x="3" y="7" width="18" height="13" rx="1"/><path d="M8 7V5a4 4 0 0 1 8 0v2"/>
    </svg>`;
  }

  function renderCard(product){
    const media = product.image_url
      ? `<img src="${product.image_url}" alt="${product.name}" loading="lazy">`
      : placeholderIcon();

    return `
      <a class="card" href="${product.slug}.html">
        <div class="card__media">
          <span class="card__tag">${product.type === 'digital' ? 'DIGITAL' : 'FÍSICO'}</span>
          ${media}
        </div>
        <div class="card__body">
          <div class="card__name">${product.name}</div>
          <div class="card__desc">${product.description || ''}</div>
          <div class="card__footer">
            <div class="card__price">${priceLabel(product.price_cents)}</div>
            <div class="card__cta">Ver produto</div>
          </div>
        </div>
      </a>
    `;
  }

  function renderGrid(){
    const filtered = currentFilter === 'all'
      ? allProducts
      : allProducts.filter(p => p.type === currentFilter);

    if (filtered.length === 0){
      grid.innerHTML = '<div class="state-msg">Nenhum produto nessa categoria ainda.</div>';
      return;
    }

    grid.innerHTML = filtered.map(renderCard).join('');
  }

  filtersEl.addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    currentFilter = btn.dataset.filter;
    filtersEl.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('is-active', b === btn));
    renderGrid();
  });

  async function loadCatalog(){
    const { data, error } = await sb
      .from('products')
      .select('slug, name, description, price_cents, type, image_url')
      .eq('active', true)
      .order('created_at', { ascending: true });

    if (error){
      console.error(error);
      grid.innerHTML = '<div class="state-msg is-error">Não foi possível carregar o catálogo agora.</div>';
      return;
    }

    if (!data || data.length === 0){
      grid.innerHTML = '<div class="state-msg">Nenhum produto disponível no momento.</div>';
      return;
    }

    allProducts = data;
    renderGrid();
  }

  loadCatalog();
</script>

</body>
</html>
