<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Núcleo</title>

<link rel="icon" type="image/svg+xml" href="assets/icon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="512x512" href="assets/favicon-512.png">

<meta property="og:title" content="Núcleo">
<meta property="og:description" content="Atrai. Filtra. Converte.">
<meta property="og:image" content="assets/og-image.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-void:#0a0e16;
    --bg-panel:#10172a;
    --accent-cyan:#2de2e6;
    --accent-magenta:#ff2469;
    --accent-amber:#ffcb47;
    --text-primary:#e7eef5;
    --text-dim:#7c8aa0;
    --line:rgba(45,226,230,0.18);
    --font-display:'Chakra Petch', sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    min-height:100vh;
    background-color:var(--bg-void);
    background-image: radial-gradient(circle at 50% 0%, rgba(45,226,230,0.10), transparent 55%);
    color:var(--text-primary);
    font-family:var(--font-mono);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
  }
  a{color:inherit;text-decoration:none;}
  :focus-visible{outline:2px solid var(--accent-cyan);outline-offset:3px;}

  .card{width:100%;max-width:420px;text-align:center;}

  .logo-row{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:10px;}
  .logo-row svg{width:40px;height:40px;}
  .logo-row .word{font-family:var(--font-display);font-weight:700;font-size:26px;letter-spacing:0.04em;}
  .logo-row .word span{color:var(--accent-cyan);}

  .tag{font-size:11px;letter-spacing:0.25em;color:var(--text-dim);margin-bottom:42px;}

  .links{display:flex;flex-direction:column;gap:12px;}

  .link-btn{
    display:flex;align-items:center;gap:14px;
    padding:16px 20px;
    border:1px solid var(--line);
    background:var(--bg-panel);
    font-family:var(--font-mono);
    font-size:14px;
    letter-spacing:0.03em;
    transition:transform 0.15s ease, border-color 0.15s ease;
  }
  .link-btn:hover{transform:translateY(-2px);border-color:var(--accent-cyan);}
  .link-btn svg{width:20px;height:20px;flex-shrink:0;color:var(--accent-cyan);}
  .link-btn .arrow{margin-left:auto;color:var(--text-dim);}

  .link-btn.primary{
    background:var(--accent-cyan);
    color:var(--bg-void);
    border-color:var(--accent-cyan);
    font-weight:600;
    text-transform:uppercase;
    font-size:13px;
    letter-spacing:0.08em;
  }
  .link-btn.primary svg{color:var(--bg-void);}
  .link-btn.primary .arrow{color:var(--bg-void);}

  footer{margin-top:46px;font-size:10px;letter-spacing:0.1em;color:var(--text-dim);}
</style>
</head>
<body>

  <div class="card">
    <div class="logo-row">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <g stroke="#2de2e6" stroke-width="4" fill="none">
          <line x1="50" y1="50" x2="50" y2="16"/>
          <line x1="50" y1="50" x2="80" y2="67"/>
          <line x1="50" y1="50" x2="20" y2="67"/>
        </g>
        <circle cx="50" cy="50" r="11" fill="#2de2e6"/>
        <circle cx="50" cy="16" r="6.5" fill="#e7eef5"/>
        <circle cx="80" cy="67" r="6.5" fill="#e7eef5"/>
        <circle cx="20" cy="67" r="6.5" fill="#ff2469"/>
      </svg>
      <div class="word">NÚCLE<span>O</span></div>
    </div>
    <div class="tag">ATRAI · FILTRA · CONVERTE</div>

    <div class="links">

      <!-- Link principal: a loja -->
      <a class="link-btn primary" href="/loja/">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="7" width="18" height="13" rx="1"/><path d="M8 7V5a4 4 0 0 1 8 0v2"/></svg>
        Entrar na loja
        <span class="arrow">→</span>
      </a>

      <!-- TROQUE ESTES LINKS pelos seus de verdade -->
      <a class="link-btn" href="https://instagram.com/SEU_PERFIL" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.8" fill="currentColor"/></svg>
        Instagram
        <span class="arrow">→</span>
      </a>

      <a class="link-btn" href="https://youtube.com/@SEU_CANAL" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="5" width="20" height="14" rx="3"/><path d="M11 9l4 3-4 3z" fill="currentColor" stroke="none"/></svg>
        YouTube
        <span class="arrow">→</span>
      </a>

      <a class="link-btn" href="https://wa.me/55SEUNUMERO" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 11.5a8.5 8.5 0 1 1-4.5-7.5L21 3l-1 4.5a8.46 8.46 0 0 1 1 4z"/></svg>
        WhatsApp
        <span class="arrow">→</span>
      </a>

    </div>

    <footer>NÚCLEO © 2026</footer>
  </div>

</body>
</html>
