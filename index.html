<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fabricio</title>

<link rel="icon" type="image/svg+xml" href="assets/icon-pessoal.svg">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-pessoal-32.png">
<link rel="icon" type="image/png" sizes="512x512" href="assets/favicon-pessoal-512.png">

<meta property="og:title" content="Fabricio">
<meta property="og:description" content="Projetos e trabalhos.">
<meta property="og:image" content="https://abuystore.netlify.app/assets/og-pessoal.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-void:#0d0a14;
    --bg-panel:#171221;
    --accent-violet:#b14aff;
    --accent-green:#39ff88;
    --accent-orange:#ff7b2f;
    --text-primary:#ece7f5;
    --text-dim:#8d83a3;
    --line:rgba(177,74,255,0.22);
    --font-display:'Chakra Petch', sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    min-height:100vh;
    background-color:var(--bg-void);
    background-image: radial-gradient(circle at 50% 0%, rgba(177,74,255,0.14), transparent 55%);
    color:var(--text-primary);
    font-family:var(--font-mono);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
  }
  a{color:inherit;text-decoration:none;}
  :focus-visible{outline:2px solid var(--accent-violet);outline-offset:3px;}

  .card{width:100%;max-width:440px;text-align:center;}

  .logo-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:10px;}
  .logo-row .mark{
    font-family:var(--font-display);font-weight:700;font-size:20px;
    border:2px solid var(--accent-violet);color:var(--accent-violet);
    padding:4px 10px;line-height:1;
  }
  .logo-row .mark .cursor{display:inline-block;width:8px;height:14px;background:var(--accent-green);margin-left:2px;animation:blink 1.1s step-end infinite;vertical-align:middle;}
  @keyframes blink{50%{opacity:0;}}
  .logo-row .word{font-family:var(--font-display);font-weight:700;font-size:24px;letter-spacing:0.04em;}

  .tag{font-size:11px;letter-spacing:0.25em;color:var(--text-dim);margin-bottom:42px;text-transform:uppercase;}

  .links{display:flex;flex-direction:column;gap:12px;}

  .work-card{
    display:block;text-align:left;
    padding:16px 20px;
    border:1px solid var(--line);
    background:var(--bg-panel);
    transition:transform 0.15s ease, border-color 0.15s ease;
  }
  .work-card:hover{transform:translateY(-2px);border-color:var(--accent-violet);}
  .work-card .row{display:flex;align-items:center;gap:14px;}
  .work-card svg{width:20px;height:20px;flex-shrink:0;color:var(--accent-violet);}
  .work-card .titles{flex:1;}
  .work-card .title{font-size:14px;font-weight:600;letter-spacing:0.03em;}
  .work-card .desc{font-size:11.5px;color:var(--text-dim);margin-top:2px;}
  .work-card .arrow{color:var(--text-dim);font-size:16px;}

  .work-card.featured{
    background:var(--accent-violet);
    border-color:var(--accent-violet);
  }
  .work-card.featured svg,
  .work-card.featured .arrow{color:var(--bg-void);}
  .work-card.featured .title{color:var(--bg-void);}
  .work-card.featured .desc{color:rgba(13,10,20,0.7);}

  footer{margin-top:46px;font-size:10px;letter-spacing:0.1em;color:var(--text-dim);}
</style>
</head>
<body>

  <div class="card">
    <div class="logo-row">
      <span class="mark">F<span class="cursor"></span></span>
      <div class="word">FABRICIO</div>
    </div>
    <div class="tag">PROJETOS · TRABALHOS · CANAIS</div>

    <div class="links">

      <!-- Trabalho em destaque: a loja -->
      <a class="work-card featured" href="/loja/">
        <div class="row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="7" width="18" height="13" rx="1"/><path d="M8 7V5a4 4 0 0 1 8 0v2"/></svg>
          <div class="titles">
            <div class="title">ABUY</div>
            <div class="desc">Loja — produtos digitais e físicos</div>
          </div>
          <span class="arrow">→</span>
        </div>
      </a>

      <!-- TROQUE pelos links reais -->
      <a class="work-card" href="https://seusiteopa.netlify.app" target="_blank" rel="noopener">
        <div class="row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          <div class="titles">
            <div class="title">seusiteopa</div>
            <div class="desc">Sites e painéis pra pequenos negócios</div>
          </div>
          <span class="arrow">→</span>
        </div>
      </a>

      <a class="work-card" href="https://youtube.com/@SEU_CANAL" target="_blank" rel="noopener">
        <div class="row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="5" width="20" height="14" rx="3"/><path d="M11 9l4 3-4 3z" fill="currentColor" stroke="none"/></svg>
          <div class="titles">
            <div class="title">YouTube</div>
            <div class="desc">[sobre o que é o canal]</div>
          </div>
          <span class="arrow">→</span>
        </div>
      </a>

      <a class="work-card" href="https://instagram.com/SEU_PERFIL" target="_blank" rel="noopener">
        <div class="row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.8" fill="currentColor"/></svg>
          <div class="titles">
            <div class="title">Instagram</div>
            <div class="desc">[bastidores / conteúdo pessoal]</div>
          </div>
          <span class="arrow">→</span>
        </div>
      </a>

      <a class="work-card" href="https://wa.me/55SEUNUMERO" target="_blank" rel="noopener">
        <div class="row">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 11.5a8.5 8.5 0 1 1-4.5-7.5L21 3l-1 4.5a8.46 8.46 0 0 1 1 4z"/></svg>
          <div class="titles">
            <div class="title">WhatsApp</div>
            <div class="desc">Fale direto comigo</div>
          </div>
          <span class="arrow">→</span>
        </div>
      </a>

    </div>

    <footer>FABRICIO © 2026</footer>
  </div>

</body>
</html>
